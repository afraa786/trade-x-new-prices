spring.application.name=alpharedge-api
server.port=8080
spring.profiles.active=dev

# Development - Use embedded MongoDB
spring.data.mongodb.database=alpharedge
spring.data.mongodb.auto-index-creation=true

# Mail configuration (optional for dev)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:test@example.com}
spring.mail.password=${MAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OpenAPI/Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging - DEBUG for development
logging.level.root=INFO
logging.level.com.alpharedge=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.file.name=logs/spring.log
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Development features
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

# Spring properties
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
