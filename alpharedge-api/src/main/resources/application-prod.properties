spring.application.name=alpharedge-api
server.port=8080
spring.profiles.active=prod

# Production - External MongoDB
spring.data.mongodb.uri=mongodb://${MONGO_USER:admin}:${MONGO_PASSWORD:password}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:alpharedge}?authSource=admin
spring.data.mongodb.auto-index-creation=false

# Mail configuration (required for prod)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=${MAIL_FROM:noreply@alpharedge.com}

# OpenAPI/Swagger - Disabled in production for security
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=false

# Logging - Production level
logging.level.root=WARN
logging.level.com.alpharedge=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.data.mongodb=WARN
logging.file.name=logs/alpharedge-prod.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Production - Minimal error details
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Thread pool and connection settings
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000
server.tomcat.accept-count=100

# Connection timeout
server.tomcat.connection-timeout=20000
server.servlet.session.timeout=30m

# Security headers
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
