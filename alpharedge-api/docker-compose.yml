version: '3.8'

services:
  mongodb:
    image: mongo:7-alpine
    container_name: alpharedge-mongodb
    environment:
      MONGO_INITDB_DATABASE: alpharedge
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - alpharedge-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  alpharedge-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alpharedge-api
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/alpharedge
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - alpharedge-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/swagger-ui.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:

networks:
  alpharedge-network:
    driver: bridge
